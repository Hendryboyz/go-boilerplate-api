version: v2
managed:
  enabled: true
  disable:
    - module: buf.build/googleapis/googleapis
  override:
  - file_option: go_package_prefix
    value: go-boilerplate-api/pkg/

plugins:
  - local: protoc-gen-go
    out: pkg/proto
    opt:
      - module=go-boilerplate-api/pkg/proto
      - paths=import
  - local: protoc-gen-go-grpc
    out: pkg/proto
    opt:
      - module=go-boilerplate-api/pkg/proto
      - paths=import
  - local: protoc-gen-grpc-gateway
    out: pkg/proto
    opt:
      - generate_unbound_methods=true
      - module=go-boilerplate-api/pkg/proto
      - paths=import
