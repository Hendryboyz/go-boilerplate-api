root = "."
tmp_dir = "tmp"

[build]
  args_bin = []
  bin = "./tmp/api"
  cmd = "go build -o ./tmp/api ."
  delay = 1000 # ms
  exclude_dir = ["cmd", "assets", "tmp", "vendor", "migrations", "node_modules", "local", "build", "docs", "deploy", "allure-results", "test"]
  exclude_file = ["wire_gen.go"]
  exclude_regex = ["_test\\.go", ".*\\/allure-results\\/.*", ".*\\/allure-results"]
  exclude_unchanged = true
  follow_symlink = false
  full_bin = "APP_NAME=go-boilerplate-api ./tmp/api"
  include_dir = []
  include_ext = ["go", "tpl", "tmpl", "html"]
  include_file = []
  kill_delay = 1000 # nanosecond
  log = "build-errors.log"
  poll = false
  poll_interval = 0
  post_cmd = [""]
  pre_cmd = ["wire", "swag init -o docs -g ./internal/app/api/http/index.go"]
  rerun = false
  rerun_delay = 500
  send_interrupt = false
  stop_on_error = true

[watcher]
  ignore = ["*/allure-results/*", "allure-results/*"]

[color]
  app = ""
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"

[log]
  main_only = false
  silent = false
  time = false

[misc]
  clean_on_exit = true

[proxy]
  app_port = 0
  enabled = false
  proxy_port = 0

[screen]
  clear_on_rebuild = false
  keep_scroll = true
